<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青空文庫 - ランダムな一文</title>
  <style>
    @charset "utf-8";

    body {
      background-color: lightyellow;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 10vh 0;
      gap: 15vh; /* 原稿用紙と原稿用紙の間の余白 */
    }

    .paper-container {
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 1s ease, transform 1s ease;
    }

    .paper-container.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .sakubun {
      font-family: "ヒラギノ明朝 ProN W3", "HiraMinProN-W3", "HG明朝E", "ＭＳ Ｐ明朝", "MS PMincho", "MS 明朝", serif;
      font-size: 28px;
      color: #333;
      position: relative;
      letter-spacing: .5em;
      line-height: 2em;
      padding: 5px;
      float: right;
      -ms-writing-mode: tb-rl;
      -webkit-writing-mode: vertical-rl;
      writing-mode: vertical-rl;
      box-sizing: content-box; 
      overflow: hidden; 
    }

    .sakubun::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(to left, rgba(0,0,0,.2) 1px, transparent 0),
        linear-gradient(to bottom, rgba(0,0,0,.2) 1px, transparent 0),
        linear-gradient(to left, transparent 11px, rgba(0,0,0,.2) 12px, transparent 0);
      background-size: 2em 1.5em;
      background-position: top right;
      background-origin: padding-box;
      margin-right: -5px;
      z-index: -1;
    }

    .sakubun::after {
      content: '';
      display: block;
      clear: both;
    }

    /* 🌟 最後の1マス問題の解決！ */
    .sakubun p.sentence {
      margin: 0 !important; 
      padding: 0;
    }
    
    /* 🌟 作家名を左下に配置する魔法のスタイル */
    .sakubun p.meta {
      position: absolute;
      bottom: 0;   /* 原稿用紙の底辺にぴったり揃える */
      left: 0;     /* 原稿用紙の左端にぴったり揃える */
      margin: 0;
      font-size: 16px; /* 本文より小さく */
      line-height: 1;
      letter-spacing: 2px;
      color: #555;
      white-space: nowrap; /* 改行させない */
    }

    a {
      text-decoration: none;
      color: inherit;
      transition: color 0.3s ease;
    }
    a:hover {
      color: #b7282e;
    }

    #scroll-sensor {
      width: 100%;
      height: 1px;
    }
  </style>
</head>
<body>

  <div id="main-wrapper" style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15vh;">
    </div>

  <div id="scroll-sensor"></div>

  <script>
    let shuffledDeck = [];
    let currentIndex = 0;
    let sentencesData = [];
    let totalFiles = 0;
    let chunkPlaylist = [];    
    let currentChunkIndex = 0; 

    function shuffle(array) {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
      }
      return newArray;
    }

    function initPlaylist(total) {
      const savedData = localStorage.getItem('aozoraPlaylist');
      if (savedData) {
        const parsed = JSON.parse(savedData);
        if (parsed.total === total && parsed.playlist.length > 0) {
          chunkPlaylist = parsed.playlist;
          currentChunkIndex = parsed.index;
          return;
        }
      }
      let newPlaylist = [];
      for(let i = 0; i < total; i++) {
        newPlaylist.push(i);
      }
      chunkPlaylist = shuffle(newPlaylist);
      currentChunkIndex = 0;
      savePlaylist();
    }

    function savePlaylist() {
      localStorage.setItem('aozoraPlaylist', JSON.stringify({
        total: totalFiles,
        playlist: chunkPlaylist,
        index: currentChunkIndex
      }));
    }

    async function loadNextDataChunk() {
      try {
        if (currentChunkIndex >= chunkPlaylist.length) {
          chunkPlaylist = shuffle(chunkPlaylist);
          currentChunkIndex = 0;
        }
        const fileId = chunkPlaylist[currentChunkIndex];
        currentChunkIndex++;
        savePlaylist(); 

        const response = await fetch(`data/data_${fileId}.json`);
        sentencesData = await response.json();
        shuffledDeck = shuffle(sentencesData);
        currentIndex = 0;
      } catch (error) {
        console.error("データの読み込みに失敗しました", error);
      }
    }

    // 🌟 文字数制限を撤廃！
    async function getNextItem() {
      while (true) {
        if (shuffledDeck.length === 0 || currentIndex >= shuffledDeck.length) {
          await loadNextDataChunk();
        }
        const item = shuffledDeck[currentIndex];
        currentIndex++;
        if (item && item.text) return item;
      }
    }

    function calculatePaperSize() {
      const CELL_W = 56; 
      const CELL_H = 42; 
      const availW = window.innerWidth * 0.8;
      const availH = window.innerHeight * 0.8;
      const cols = Math.max(5, Math.floor(availW / CELL_W));
      const rows = Math.max(10, Math.floor(availH / CELL_H));

      return { cols, rows, CELL_W, CELL_H };
    }

    async function createPaper(isInitialLoading = false) {
      const size = calculatePaperSize();
      let item;

      if (isInitialLoading) {
        item = { text: "読み込み中...\n（データが大きいため数秒かかります）", title: "準備中", url: "#" };
        renderPages(item, size, true);
        return document.querySelector('.paper-container');
      } else {
        item = await getNextItem();
        if (!item) return;
        renderPages(item, size, false);
      }
    }

    // 🌟 長文を複数の原稿用紙に分割する魔法の関数
    function renderPages(item, size, isInitialLoading) {
      const { cols, rows, CELL_W, CELL_H } = size;
      let remainingText = item.text;
      let pages = [];

      if (isInitialLoading) {
        pages.push({ text: remainingText, isLast: true });
      } else {
        const fullPageChars = cols * rows;               // 1ページに入る最大文字数
        const lastPageMaxChars = (cols - 1) * rows;      // 左端の「作家名」の行を空けた最大文字数

        while (remainingText.length > 0) {
          // 作家名を入れても収まる場合は、これが最後のページ！
          if (remainingText.length <= lastPageMaxChars) {
            pages.push({ text: remainingText, isLast: true });
            remainingText = '';
          } 
          // 文字数は1ページに収まるが、作家名を入れると文字が被ってしまう場合
          // （文字を少し次のページに押し出して、作家名の場所を確保する）
          else if (remainingText.length <= fullPageChars) {
            let chunk = remainingText.substring(0, lastPageMaxChars);
            pages.push({ text: chunk, isLast: false });
            remainingText = remainingText.substring(lastPageMaxChars);
          } 
          // まだまだ続く長文の場合
          else {
            let chunk = remainingText.substring(0, fullPageChars);
            pages.push({ text: chunk, isLast: false });
            remainingText = remainingText.substring(fullPageChars);
          }
        }
      }

      // 分割したページを順番に画面に出力する
      pages.forEach((pageData, index) => {
        const container = document.createElement('div');
        container.className = 'paper-container';

        const sakubun = document.createElement('div');
        sakubun.className = 'sakubun';
        sakubun.style.width = `${cols * CELL_W}px`;
        sakubun.style.height = `${rows * CELL_H}px`;

        const sentence = document.createElement('p');
        sentence.className = 'sentence';
        sentence.innerText = pageData.text;
        sakubun.appendChild(sentence);

        // 最後のページにだけ、左下に小さく作家名を添える
        if (pageData.isLast) {
          const meta = document.createElement('p');
          meta.className = 'meta';
          const link = document.createElement('a');
          link.href = item.url;
          if (!isInitialLoading) {
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.title = '図書カードを開く';
          }
          link.textContent = "―― " + item.title;
          meta.appendChild(link);
          sakubun.appendChild(meta);
        }

        container.appendChild(sakubun);
        document.getElementById('main-wrapper').appendChild(container);

        // 複数ページある場合は、0.2秒ずつズラしてフワッと表示させる演出
        setTimeout(() => { container.classList.add('visible'); }, 50 + (index * 200));
      });
    }

    function setupInfiniteScroll() {
      const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
          createPaper(); 
        }
      }, { rootMargin: '200px' });
      observer.observe(document.getElementById('scroll-sensor'));
    }

    window.addEventListener('load', async () => {
      const loadingContainer = await createPaper(true);

      try {
        const configRes = await fetch('data/config.json');
        const config = await configRes.json();
        totalFiles = config.totalChunks;

        initPlaylist(totalFiles);
        await loadNextDataChunk();

        if (loadingContainer) loadingContainer.remove();
        await createPaper();
        setupInfiniteScroll();
      } catch (error) {
        console.error("初期化エラー:", error);
      }
    });
  </script>
</body>
</html>
