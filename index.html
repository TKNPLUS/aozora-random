<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青空文庫 - ランダムな一文</title>
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
  <style>
    @charset "utf-8";

    body {
      background-color: #e8e6d9;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 10vh 0;
      gap: 15vh;
      font-family: "ヒラギノ明朝 ProN W3", "HiraMinProN-W3", "HG明朝E", "ＭＳ Ｐ明朝", "MS PMincho", "MS 明朝", serif;
    }

    /* 🌟 右上の「しおり帳」ボタン */
    #view-bookmarks-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background-color: #fdfcf4;
      border: 1px solid #71a489;
      color: #555;
      padding: 10px 15px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 14px;
      letter-spacing: 2px;
      box-shadow: 2px 4px 10px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
      z-index: 100;
      font-family: inherit;
    }
    #view-bookmarks-btn:hover {
      background-color: #71a489;
      color: white;
    }

    .paper-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px; 
      padding: 20px; 
      background-color: #e8e6d9; 
      width: 100%;
    }

    .paper-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #fdfcf4;
      padding: 40px 40px 30px 40px; 
      border: 1px solid #71a489;
      box-shadow: 4px 8px 25px rgba(0,0,0,0.15);
      position: relative; 
      
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 1s ease, transform 1s ease;
    }

    .paper-container.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .sakubun {
      font-size: 28px;
      color: #333;
      position: relative;
      letter-spacing: .5em;
      line-height: 2em;
      padding: 5px;
      float: right;
      -ms-writing-mode: tb-rl;
      -webkit-writing-mode: vertical-rl;
      writing-mode: vertical-rl;
      box-sizing: content-box; 
      overflow: hidden; 
    }

    .sakubun::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(to left, rgba(0,0,0,.2) 1px, transparent 0),
        linear-gradient(to bottom, rgba(0,0,0,.2) 1px, transparent 0),
        linear-gradient(to left, transparent 11px, rgba(0,0,0,.2) 12px, transparent 0);
      background-size: 2em 1.5em;
      background-position: top right;
      background-origin: padding-box;
      margin-right: -5px;
      z-index: -1;
    }

    .sakubun::after { content: ''; display: block; clear: both; }
    .sakubun p.sentence { margin: 0 !important; padding: 0; }
    
    .sakubun p.meta {
      margin: 0;
      text-align: right;
      font-size: 16px;   
      line-height: 56px; 
      letter-spacing: 2px;
      color: #555;
    }

    .page-number {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: #bbb;
      letter-spacing: 2px;
    }

    .text-id {
      position: absolute;
      bottom: 8px;
      right: 40px;
      font-size: 14px;
      color: #ccc;
      letter-spacing: 1px;
    }

    /* 🌟 アクションボタン（𝕏 と 🔖）を並べるコンテナ */
    .action-buttons {
      position: absolute;
      bottom: 5px; 
      left: 40px; 
      display: flex;
      gap: 15px;
    }

    .icon-btn {
      background: none;
      border: none;
      color: #bbb;
      font-size: 20px; 
      font-family: sans-serif;
      cursor: pointer;
      padding: 0;
      margin: 0;
      transition: all 0.3s ease;
    }
    .icon-btn:hover { color: #333; transform: scale(1.1); }
    .icon-btn.active { color: #d9534f; /* しおりを挟んだ時の色 */ }

    /* 🌟 しおり帳（モーダルウィンドウ）のデザイン */
    #bookmark-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(3px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .modal-content {
      background: #fdfcf4;
      width: 90%; max-width: 600px; height: 80vh;
      border: 1px solid #71a489;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      border-bottom: 1px solid #71a489;
    }
    .modal-header h2 { margin: 0; font-size: 20px; color: #333; letter-spacing: 2px; }
    .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #777; }
    
    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .bookmark-item {
      border-bottom: 1px dashed #ccc;
      padding: 15px 0;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .bookmark-item:hover { background-color: #f5f4eb; }
    .bm-text { font-size: 16px; color: #222; margin-bottom: 8px; line-height: 1.6; }
    .bm-meta { font-size: 12px; color: #777; text-align: right; }
    .empty-msg { text-align: center; color: #999; margin-top: 50px; }

    a { text-decoration: none; color: inherit; transition: color 0.3s ease; }
    a:hover { color: #b7282e; }
    #scroll-sensor { width: 100%; height: 1px; }
  </style>
</head>
<body>

  <button id="view-bookmarks-btn" onclick="openBookmarks()">📚 しおり帳</button>

  <div id="main-wrapper" style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15vh;"></div>
  <div id="scroll-sensor"></div>

  <div id="bookmark-modal" onclick="closeBookmarks(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2>🔖 挟んだしおり</h2>
        <button class="close-btn" onclick="closeBookmarks()">×</button>
      </div>
      <div class="modal-body" id="bookmark-list">
        </div>
    </div>
  </div>

  <script>
    let shuffledDeck = [];
    let currentIndex = 0;
    let sentencesData = [];
    let totalFiles = 0;
    let chunkPlaylist = [];    
    let currentChunkIndex = 0; 

    // 🌟 しおりデータの読み込み
    let bookmarks = JSON.parse(localStorage.getItem('aozoraBookmarks')) || [];

    const kanjiNums = ['一', '二', '三', '四', '五', '六', '七', '八', '九', '十', '十一', '十二'];

    function shuffle(array) {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
      }
      return newArray;
    }

    function initPlaylist(total) {
      const savedData = localStorage.getItem('aozoraPlaylist');
      if (savedData) {
        const parsed = JSON.parse(savedData);
        if (parsed.total === total && parsed.playlist.length > 0) {
          chunkPlaylist = parsed.playlist;
          currentChunkIndex = parsed.index;
          return;
        }
      }
      let newPlaylist = [];
      for(let i = 0; i < total; i++) newPlaylist.push(i);
      chunkPlaylist = shuffle(newPlaylist);
      currentChunkIndex = 0;
      savePlaylist();
    }

    function savePlaylist() {
      localStorage.setItem('aozoraPlaylist', JSON.stringify({ total: totalFiles, playlist: chunkPlaylist, index: currentChunkIndex }));
    }

    async function loadNextDataChunk() {
      if (currentChunkIndex >= chunkPlaylist.length) {
        chunkPlaylist = shuffle(chunkPlaylist);
        currentChunkIndex = 0;
      }
      const fileId = chunkPlaylist[currentChunkIndex];
      currentChunkIndex++;
      savePlaylist(); 

      const response = await fetch(`data/data_${fileId}.json`);
      sentencesData = await response.json();
      shuffledDeck = shuffle(sentencesData);
      currentIndex = 0;
    }

    async function getNextItem() {
      while (true) {
        if (shuffledDeck.length === 0 || currentIndex >= shuffledDeck.length) await loadNextDataChunk();
        const item = shuffledDeck[currentIndex];
        currentIndex++;
        if (item && item.text) return item;
      }
    }

    function calculatePaperSize() {
      const CELL_W = 56; const CELL_H = 42; 
      const availW = window.innerWidth * 0.8;
      const availH = window.innerHeight * 0.8;
      const cols = Math.max(5, Math.floor(availW / CELL_W));
      const rows = Math.max(10, Math.floor(availH / CELL_H));
      return { cols, rows, CELL_W, CELL_H };
    }

    async function createPaper(isInitialLoading = false, specificItem = null) {
      const size = calculatePaperSize();
      let item;

      if (specificItem) {
        item = specificItem;
      } else if (isInitialLoading) {
        item = { text: "読み込み中...", title: "準備中", url: "#" };
        renderPages(item, size, true);
        return document.querySelector('.paper-group');
      } else {
        item = await getNextItem();
        if (!item) return;
      }
      renderPages(item, size, false);
    }

    function renderPages(item, size, isInitialLoading) {
      const { cols, rows, CELL_W, CELL_H } = size;
      let remainingText = item.text;
      let pages = [];

      if (isInitialLoading) {
        pages.push({ text: remainingText, isLast: true });
      } else {
        const fullPageChars = cols * rows;               
        const lastPageMaxChars = (cols - 1) * rows;      

        while (remainingText.length > 0) {
          if (remainingText.length <= lastPageMaxChars) {
            pages.push({ text: remainingText, isLast: true });
            remainingText = '';
          } else if (remainingText.length <= fullPageChars) {
            let chunk = remainingText.substring(0, lastPageMaxChars);
            pages.push({ text: chunk, isLast: false });
            remainingText = remainingText.substring(lastPageMaxChars);
          } else {
            let chunk = remainingText.substring(0, fullPageChars);
            pages.push({ text: chunk, isLast: false });
            remainingText = remainingText.substring(fullPageChars);
          }
        }
      }

      const groupContainer = document.createElement('div');
      groupContainer.className = 'paper-group';

      pages.forEach((pageData, index) => {
        const container = document.createElement('div');
        container.className = 'paper-container';

        const sakubun = document.createElement('div');
        sakubun.className = 'sakubun';
        sakubun.style.width = `${cols * CELL_W}px`;
        sakubun.style.height = `${rows * CELL_H}px`;

        const sentence = document.createElement('p');
        sentence.className = 'sentence';
        sentence.innerText = pageData.text;
        sakubun.appendChild(sentence);

        if (pageData.isLast) {
          const meta = document.createElement('p');
          meta.className = 'meta';
          const link = document.createElement('a');
          link.href = item.url;
          if (!isInitialLoading) { link.target = '_blank'; link.title = '図書カードを開く'; }
          link.textContent = "―― " + item.title;
          meta.appendChild(link);
          sakubun.appendChild(meta);
        }

        container.appendChild(sakubun);

        if (!isInitialLoading && item.id !== undefined) {
          const pageNum = document.createElement('div');
          pageNum.className = 'page-number';
          pageNum.innerText = (kanjiNums[index] || (index + 1)) + (pages.length > 1 ? ` / ${kanjiNums[pages.length-1] || pages.length}` : '');
          container.appendChild(pageNum);

          const textId = document.createElement('div');
          textId.className = 'text-id';
          textId.innerText = `id: ${item.id}`;
          container.appendChild(textId);
          
          if (pageData.isLast) {
            // 🌟 ボタンをまとめるコンテナ
            const actionDiv = document.createElement('div');
            actionDiv.className = 'action-buttons';

            // X シェアボタン
            const shareBtn = document.createElement('button');
            shareBtn.className = 'icon-btn';
            shareBtn.innerText = '𝕏'; 
            shareBtn.title = '画像付きで X にシェア';
            shareBtn.onclick = () => sharePaper(groupContainer, item, actionDiv);
            actionDiv.appendChild(shareBtn);

            // しおりボタン
            const bkmkBtn = document.createElement('button');
            const isBookmarked = bookmarks.some(b => b.id === item.id);
            bkmkBtn.className = `icon-btn ${isBookmarked ? 'active' : ''}`;
            bkmkBtn.innerText = '🔖';
            bkmkBtn.title = 'しおりを挟む';
            bkmkBtn.style.opacity = isBookmarked ? '1' : '0.4';
            bkmkBtn.onclick = () => toggleBookmark(item, bkmkBtn);
            actionDiv.appendChild(bkmkBtn);

            container.appendChild(actionDiv);
          }
        }

        groupContainer.appendChild(container);
        setTimeout(() => { container.classList.add('visible'); }, 50 + (index * 200));
      });

      document.getElementById('main-wrapper').appendChild(groupContainer);
    }

    // 🌟 しおりの保存・解除
    function toggleBookmark(item, btnElement) {
      const index = bookmarks.findIndex(b => b.id === item.id);
      if (index === -1) {
        bookmarks.unshift(item); // 先頭（一番上）に追加
        btnElement.classList.add('active');
        btnElement.style.opacity = '1';
      } else {
        bookmarks.splice(index, 1);
        btnElement.classList.remove('active');
        btnElement.style.opacity = '0.4';
      }
      localStorage.setItem('aozoraBookmarks', JSON.stringify(bookmarks));
      renderBookmarkList(); // 開いている場合はリストも更新
    }

    // 🌟 しおり帳モーダルの操作
    function openBookmarks() {
      const modal = document.getElementById('bookmark-modal');
      modal.style.display = 'flex';
      renderBookmarkList();
      setTimeout(() => modal.style.opacity = '1', 10);
    }

    function closeBookmarks(e) {
      if (e && e.target.id !== 'bookmark-modal' && e.target.className !== 'close-btn') return;
      const modal = document.getElementById('bookmark-modal');
      modal.style.opacity = '0';
      setTimeout(() => modal.style.display = 'none', 300);
    }

    function renderBookmarkList() {
      const listDiv = document.getElementById('bookmark-list');
      listDiv.innerHTML = '';
      if (bookmarks.length === 0) {
        listDiv.innerHTML = '<div class="empty-msg">まだしおりが挟まれていません。<br>お気に入りの文を見つけたら 🔖 を押してみましょう。</div>';
        return;
      }

      bookmarks.forEach(b => {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'bookmark-item';
        // クリックでその文の専用URLを開く
        itemDiv.onclick = () => {
          const shareUrl = window.location.origin + window.location.pathname + '?id=' + b.id;
          window.open(shareUrl, '_blank');
        };

        const textDiv = document.createElement('div');
        textDiv.className = 'bm-text';
        // プレビュー用に少し文字を丸める
        textDiv.innerText = b.text.length > 50 ? b.text.substring(0, 50) + '...' : b.text;

        const metaDiv = document.createElement('div');
        metaDiv.className = 'bm-meta';
        metaDiv.innerText = `―― ${b.title}`;

        itemDiv.appendChild(textDiv);
        itemDiv.appendChild(metaDiv);
        listDiv.appendChild(itemDiv);
      });
    }

    async function sharePaper(groupElement, item, actionDiv) {
      try {
        actionDiv.style.display = 'none'; // スクショ時にすべてのアクションボタンを隠す

        const dataUrl = await htmlToImage.toPng(groupElement, { 
          backgroundColor: '#e8e6d9',
          pixelRatio: 2 
        });
        
        actionDiv.style.display = 'flex'; 
        
        const shareUrl = window.location.origin + window.location.pathname + '?id=' + item.id;
        const shareText = `${item.title} からの一文\n#青空文庫ランダム一文\n`;

        try {
          const response = await fetch(dataUrl);
          const blob = await response.blob();
          const file = new File([blob], `aozora_${item.id}.png`, { type: 'image/png' });
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ text: shareText + shareUrl, files: [file] });
            return;
          }
        } catch (e) { }

        await navigator.clipboard.writeText(shareUrl);
        const link = document.createElement('a');
        link.download = `aozora_${item.id}.png`;
        link.href = dataUrl;
        link.click();

        if (confirm('画像をダウンロードしました。\n続いてX（Twitter）の投稿画面を開きますか？\n（※PC版のXでは、手動でダウンロードした画像を添付してください）')) {
          const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}`;
          window.open(twitterUrl, '_blank');
        }
      } catch (err) {
        alert('シェア画像の作成に失敗しました。');
        actionDiv.style.display = 'flex';
      }
    }

    function setupInfiniteScroll() {
      const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) createPaper(); 
      }, { rootMargin: '200px' });
      observer.observe(document.getElementById('scroll-sensor'));
    }

    window.addEventListener('load', async () => {
      const loadingContainer = await createPaper(true);

      try {
        const configRes = await fetch('data/config.json');
        const configData = await configRes.json();
        totalFiles = configData.totalChunks;
        
        initPlaylist(totalFiles);

        const urlParams = new URLSearchParams(window.location.search);
        const sharedId = urlParams.get('id');

        if (loadingContainer) loadingContainer.remove();

        if (sharedId !== null) {
          const id = parseInt(sharedId);
          const chunkSize = configData.chunkSize || 5000;
          const chunkId = Math.floor(id / chunkSize);

          try {
            const res = await fetch(`data/data_${chunkId}.json`);
            const chunkData = await res.json();
            const targetItem = chunkData.find(item => item.id === id);

            if (targetItem) {
              await createPaper(false, targetItem); 
            }
          } catch(e) { }
        }

        await loadNextDataChunk();
        if (sharedId === null) await createPaper(); 
        setupInfiniteScroll();

      } catch (error) { }
    });
  </script>
</body>
</html>
